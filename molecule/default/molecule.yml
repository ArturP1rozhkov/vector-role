---
dependency:
  name: shell
  command: /bin/true

driver:
  name: docker

platforms:
  - name: ubuntu
    image: ubuntu:latest
    pre_build_image: true
    command: sleep infinity

  - name: oraclelinux
    image: oraclelinux:8
    pre_build_image: true
    command: sleep infinity

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/..:${MOLECULE_PROJECT_DIRECTORY}"
  playbooks:
    create: create.yml
    prepare: prepare.yml
    converge: converge.yml
    destroy: destroy.yml
    verify: verify.yml

scenario:
  name: default
  test_sequence:
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible