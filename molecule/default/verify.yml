---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Check vector install directory
      ansible.builtin.stat:
        path: "{{ ansible_facts['user_dir'] }}/vector"
      register: vector_dir

    - name: Check vector binary
      ansible.builtin.stat:
        path: "{{ ansible_facts['user_dir'] }}/vector/bin/vector"
      register: vector_bin

    - name: Check vector config
      ansible.builtin.stat:
        path: "{{ ansible_facts['user_dir'] }}/vector/config/vector.yml"
      register: vector_cfg

    - name: Validate vector config
      ansible.builtin.command:
        cmd: "{{ ansible_facts['user_dir'] }}/vector/bin/vector validate {{ ansible_facts['user_dir'] }}/vector/config/vector.yml"
      register: vector_validate
      changed_when: false

    - name: Assert vector role results
      ansible.builtin.assert:
        that:
          - vector_dir.stat.exists
          - vector_dir.stat.isdir
          - vector_bin.stat.exists
          - vector_bin.stat.isreg
          - vector_cfg.stat.exists
          - vector_cfg.stat.isreg
          - vector_validate.rc == 0